<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyVault — Reset Password</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Epilogue:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surface:#141720;--card:#1c2030;--border:#2a2f42;--accent:#f0c93a;--accent3:#ff6b6b;--green:#4ade80;--text:#f0eee8;--muted:#7a8099;--pf:'Playfair Display',serif;--ep:'Epilogue',sans-serif;}
body{font-family:var(--ep);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;padding:0 2rem;height:58px;background:var(--surface);border-bottom:1px solid var(--border);}
.logo{font-family:var(--pf);font-size:20px;font-weight:900;cursor:pointer;text-decoration:none;color:var(--text)}.logo span{color:var(--accent)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;width:100%;max-width:400px;}
.box h2{font-family:var(--pf);font-size:24px;font-weight:900;margin-bottom:4px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fg input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--text);outline:none;font-family:var(--ep);}
.fg input:focus{border-color:var(--accent);}
.fg input::placeholder{color:var(--muted);}
.btn{width:100%;background:var(--accent);color:#0d0f14;border:none;border-radius:10px;padding:12px;font-family:var(--pf);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn:hover{opacity:.88;}.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:#2a1a1a;border:1px solid #4a2a2a;color:var(--accent3);border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:14px;display:none;}
.err.show{display:block;}
.ok{background:#1a2a1a;border:1px solid #2a4a2a;color:var(--green);border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:14px;display:none;}
.ok.show{display:block;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#0d0f14;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.pass-bar{height:3px;border-radius:2px;margin-top:5px;background:#2a2f42;transition:all .3s;}
</style>
</head>
<body>
<nav><a class="logo" href="/">Study<span>Vault</span></a></nav>
<div class="wrap">
  <div class="box">
    <h2>Reset Password</h2>
    <p class="sub">Enter your new password below.</p>
    <div class="err" id="err"></div>
    <div class="ok" id="ok"></div>
    <div class="fg">
      <label>New Password</label>
      <input type="password" id="pass" placeholder="Minimum 8 characters" oninput="checkStrength()"/>
      <div class="pass-bar" id="pbar"></div>
    </div>
    <div class="fg">
      <label>Confirm New Password</label>
      <input type="password" id="pass2" placeholder="Repeat your new password"/>
    </div>
    <button class="btn" id="btn" onclick="doReset()">Reset Password</button>
  </div>
</div>
<script>
function checkStrength(){
  const p=document.getElementById('pass').value;
  const b=document.getElementById('pbar');
  let s=0;
  if(p.length>=8)s++;if(p.length>=12)s++;
  if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^a-zA-Z0-9]/.test(p))s++;
  const cols=['#ff6b6b','#ff6b6b','#f59e0b','#4ade80','#4ade80'];
  b.style.background=p?cols[Math.min(s,4)]:'#2a2f42';
}

async function doReset(){
  const pass=document.getElementById('pass').value;
  const pass2=document.getElementById('pass2').value;
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  const btn=document.getElementById('btn');
  err.classList.remove('show');ok.classList.remove('show');
  if(!pass||pass.length<8){err.textContent='Password must be at least 8 characters.';err.classList.add('show');return;}
  if(pass!==pass2){err.textContent='Passwords do not match.';err.classList.add('show');return;}
  // Get token from URL
  const params=new URLSearchParams(window.location.search);
  const token=params.get('token');
  if(!token){err.textContent='Invalid or expired reset link. Please request a new one.';err.classList.add('show');return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Resetting...';
  try{
    const res=await fetch('/api/auth/reset-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,password:pass})
    });
    const data=await res.json();
    if(res.ok){
      ok.textContent='Password reset successfully! Redirecting to login...';
      ok.classList.add('show');
      setTimeout(()=>window.location.href='/',3000);
    }else{
      err.textContent=data.message||'Reset failed. Please try again.';
      err.classList.add('show');
      btn.disabled=false;btn.textContent='Reset Password';
    }
  }catch(e){
    err.textContent='Server error. Please try again.';
    err.classList.add('show');
    btn.disabled=false;btn.textContent='Reset Password';
  }
}
</script>
</body>
</html>
